<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PACIENCIA-MAX™ — Dashboard Zen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-soft: #FDF7F2;
    --mint-main: #2D6A4F;
    --mint-light: #D8F3DC;
    --white: #FFFFFF;
    --text-dark: #1B4332;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(180deg, #FDE2E4 0%, #E2ECE9 100%); /* Fondo dividido como tu imagen */
    color: var(--text-dark);
    min-height: 100vh;
    padding-bottom: 50px;
  }

  /* --- HEADER ESTILO APP --- */
  .app-header {
    padding: 30px 25px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .user-greeting h1 { font-size: 24px; font-weight: 700; }
  .user-greeting p { font-size: 14px; opacity: 0.6; }
  .avatar { width: 45px; height: 45px; background: var(--white); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); }

  /* --- CARD PRINCIPAL (LA PASTILLA) --- */
  .main-card {
    background: var(--white);
    margin: 20px;
    padding: 30px;
    border-radius: 35px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.04);
    position: relative;
    overflow: hidden;
    text-align: center;
  }

  .pill-circle {
    width: 120px; height: 120px;
    border: 8px solid var(--mint-light);
    border-top: 8px solid var(--mint-main);
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 50px;
    animation: spin 10s linear infinite, float 3s ease-in-out infinite;
  }

  @keyframes spin { 100% { transform: rotate(360deg); } }
  @keyframes float { 50% { margin-top: -10px; } }

  .main-card h2 { font-size: 22px; margin-bottom: 5px; }
  .main-card p { font-size: 14px; opacity: 0.5; margin-bottom: 20px; }

  /* --- GRID DE DATOS (ESTILO LEADERBOARD) --- */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 0 20px;
  }

  .stat-box {
    background: var(--white);
    padding: 20px;
    border-radius: 25px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.02);
  }
  .stat-box label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; margin-bottom: 8px; }
  .stat-box span { font-size: 18px; font-weight: 700; color: var(--mint-main); }

  /* --- ADVERTENCIAS ESTILO "COURSES" --- */
  .warnings-area {
    margin: 30px 20px;
  }
  .warning-item {
    background: #FFB3C1; /* Color rosa suave como tu imagen */
    padding: 20px;
    border-radius: 25px;
    margin-bottom: 15px;
    display: flex;
    gap: 15px;
    align-items: center;
    color: #590D22;
  }
  .warning-icon { background: white; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .warning-text h4 { font-size: 14px; margin-bottom: 2px; }
  .warning-text p { font-size: 12px; opacity: 0.8; }

  /* --- BOTÓN FLOTANTE --- */
  .action-btn {
    position: fixed;
    bottom: 30px;
    left: 20px;
    right: 20px;
    background: var(--mint-main);
    color: white;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    font-weight: 600;
    box-shadow: 0 15px 30px rgba(45, 106, 79, 0.3);
    border: none;
    font-size: 16px;
  }

  /* --- ANIMACIONES AL CARGAR --- */
  .stat-box, .warning-item, .main-card {
    opacity: 0;
    transform: translateY(20px);
    animation: appear 0.6s ease forwards;
  }
  .stat-box:nth-child(1) { animation-delay: 0.1s; }
  .stat-box:nth-child(2) { animation-delay: 0.2s; }
  .warning-item:nth-child(1) { animation-delay: 0.3s; }

  @keyframes appear { to { opacity: 1; transform: translateY(0); } }

</style>
</head>
<body>

<header class="app-header">
  <div class="user-greeting">
    <p>Hola, Paciente,</p>
    <h1>Paciencia-Max™</h1>
  </div>
  <div class="avatar">🧘‍♂️</div>
</header>

<div class="main-card">
  <div class="pill-circle">🙄</div>
  <h2>Nivel de Zen: 78%</h2>
  <p>Estado estable bajo presión.</p>
  <div style="background: var(--mint-light); height: 6px; border-radius: 10px; width: 100%;"><div style="background: var(--mint-main); width: 78%; height: 100%; border-radius: 10px;"></div></div>
</div>

<div class="stats-grid">
  <div class="stat-box">
    <label>Acción</label>
    <span>Anti-Tontos</span>
  </div>
  <div class="stat-box">
    <label>Dosis</label>
    <span>1g / Zen</span>
  </div>
</div>

<div class="warnings-area">
  <div class="warning-item">
    <div class="warning-icon">⚠️</div>
    <div class="warning-text">
      <h4>No Ingerir</h4>
      <p>Es arte conceptual, no comida.</p>
    </div>
  </div>
  <div class="warning-item" style="background: #D8F3DC; color: #1B4332;">
    <div class="warning-icon">📱</div>
    <div class="warning-text">
      <h4>Sin WhatsApp</h4>
      <p>No abrir audios de +3 min.</p>
    </div>
  </div>
</div>

<button class="action-btn">FORZAR DOSIS DE CALMA</button>

</body>
</html>
