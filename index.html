<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PACIENCIA-MAX™ — Voice Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --mint-deep: #004D40;
    --mint-mid: #26A69A;
    --mint-light: #B2DFDB;
    --gray-dark: #1C1C1E;
    --gray-mid: #8E8E93;
    --white: #FFFFFF;
    --shadow-premium: 0 20px 40px rgba(0,0,0,0.06);
    --bezier: cubic-bezier(0.23, 1, 0.32, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(180deg, #FDE2E4 0%, #E2ECE9 100%);
    color: var(--gray-dark);
    min-height: 100vh;
    padding-bottom: 110px;
  }

  /* --- HEADER --- */
  .welcome-header { padding: 50px 24px 20px; animation: slideDown 0.8s var(--bezier) forwards; }
  .welcome-header p { font-size: 16px; color: var(--gray-mid); }
  .welcome-header h1 { font-size: 38px; font-weight: 700; color: var(--gray-dark); letter-spacing: -1px; }

  /* --- STATUS BLOCK CON SONIDO --- */
  main { padding: 0 20px; }
  
  .status-block {
    background: var(--mint-deep);
    color: white;
    padding: 24px;
    border-radius: 32px;
    box-shadow: 0 15px 30px rgba(0,77,64,0.2);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .voice-indicator {
    position: absolute;
    top: 20px; right: 20px;
    font-size: 14px;
    opacity: 0.5;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

  .block-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; margin-bottom: 15px; display: block; }
  #phrase-text { font-size: 20px; font-weight: 300; line-height: 1.4; font-style: italic; min-height: 90px; transition: opacity 0.3s; }

  .progress-container { height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; overflow: hidden; }
  #progress-fill { height: 100%; background: var(--mint-light); width: 0%; border-radius: 10px; }

  /* --- INFO GRID --- */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .info-box { background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); padding: 18px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.3); }
  .info-box label { display: block; font-size: 9px; text-transform: uppercase; color: var(--gray-mid); margin-bottom: 4px; }
  .info-box span { font-size: 15px; font-weight: 600; color: var(--mint-deep); }

  /* --- WARNING --- */
  .warning-card { background: #FFD2CC; color: #7F1D1D; padding: 20px; border-radius: 28px; display: flex; gap: 15px; }
  .warn-icon { width: 40px; height: 40px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .warn-text p { font-size: 12px; line-height: 1.5; opacity: 0.8; }

  /* --- BOTÓN --- */
  .btn-voice {
    position: fixed; bottom: 25px; left: 20px; right: 20px;
    background: var(--mint-mid); color: white;
    padding: 22px; border-radius: 24px; border: none;
    font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    box-shadow: 0 15px 30px rgba(38, 166, 154, 0.3);
    z-index: 1000;
  }
  .btn-voice:active { transform: scale(0.96); }

  @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body>

<div class="welcome-header">
  <p>Hola, Lorena,</p>
  <h1>Paciencia-Max™ 🙄</h1>
</div>

<main>
  <div class="status-block">
    <div class="voice-indicator">🔊 Audio Activo</div>
    <span class="block-label">Mecanismo de Acción</span>
    <div id="phrase-text">Iniciando protocolo de audio para Lorena...</div>
    <div class="progress-container"><div id="progress-fill"></div></div>
  </div>

  <div class="info-grid">
    <div class="info-box"><label>Modo</label><span>Voz Guía</span></div>
    <div class="info-box"><label>Lorena Zen</label><span>82%</span></div>
    <div class="info-box"><label>NFC</label><span>Verificado</span></div>
    <div class="info-box"><label>Idioma</label><span>Español</span></div>
  </div>

  <div class="warning-card">
    <div class="warn-icon">⚠️</div>
    <div class="warn-text">
      <h4 style="font-size: 14px; margin-bottom: 2px;">Nota de seguridad</h4>
      <p>Asegúrate de tener el volumen activo. El sistema leerá las dosis de calma automáticamente.</p>
    </div>
  </div>
</main>

<button class="btn-voice" onclick="handleInteraction()">FORZAR DOSIS CON VOZ</button>

<script>
  const phrases = [
    "Lorena, respira. Esa persona no sabe que es tu chiste interno.",
    "No es que te falte paciencia, es que te sobra gente tonta alrededor.",
    "Activando modo: Sonreír y asentir mientras pienso en otra cosa.",
    "Protocolo Lorena: Niveles de tolerancia al dos por ciento. No preguntar nada obvio.",
    "La paciencia es una virtud, pero esta pastilla es más rápida.",
    "Sistema activo: Ignorando notificaciones irrelevantes..."
  ];

  let current = 0;
  const duration = 7500;
  let startTime = Date.now();
  let firstClick = false;

  function speak(text) {
    // Cancela cualquier voz previa
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'es-ES';
    utterance.rate = 0.9; // Un poco más lento para sonar profesional
    utterance.pitch = 1.1; 
    window.speechSynthesis.speak(utterance);
  }

  function handleInteraction() {
    if(!firstClick) firstClick = true;
    triggerNext();
  }

  function triggerNext() {
    const el = document.getElementById('phrase-text');
    el.style.opacity = 0;
    
    setTimeout(() => {
      current = (current + 1) % phrases.length;
      const nextText = phrases[current];
      el.textContent = nextText;
      el.style.opacity = 1;
      
      if(firstClick) speak(nextText);
      
      startTime = Date.now();
    }, 400);
  }

  function update() {
    const elapsed = Date.now() - startTime;
    const progress = Math.min((elapsed / duration) * 100, 100);
    document.getElementById('progress-fill').style.width = progress + '%';
    
    if (elapsed >= duration) {
      triggerNext();
    }
    requestAnimationFrame(update);
  }

  // Iniciar
  update();
</script>

</body>
</html>
